<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
      }

      .paste-zone {
        align-items: center;
        background: rgba(15, 23, 42, 0.68);
        border: 1px dashed rgba(56, 189, 248, 0.55);
        border-radius: 8px;
        color: #cbd5e1;
        cursor: text;
        display: flex;
        gap: 12px;
        min-height: 72px;
        outline: none;
        padding: 14px 16px;
        transition: border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
      }

      .paste-zone:focus,
      .paste-zone:hover {
        background: rgba(14, 165, 233, 0.10);
        border-color: rgba(125, 211, 252, 0.95);
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.18);
      }

      .icon {
        align-items: center;
        background: rgba(14, 165, 233, 0.14);
        border: 1px solid rgba(125, 211, 252, 0.35);
        border-radius: 8px;
        color: #7dd3fc;
        display: flex;
        flex: 0 0 42px;
        height: 42px;
        justify-content: center;
      }

      .title {
        color: #f8fafc;
        font-size: 14px;
        font-weight: 760;
        line-height: 1.3;
      }

      .hint {
        color: #94a3b8;
        font-size: 12px;
        line-height: 1.45;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="paste-zone" id="pasteZone" tabindex="0" role="button" aria-label="Dán ảnh từ clipboard">
      <div class="icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M8 7V5.8C8 4.8 8.8 4 9.8 4h4.4c1 0 1.8.8 1.8 1.8V7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M8 6h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M7 8H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M9 13h6M9 16h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="title" id="title">Click vào đây, sau đó nhấn Ctrl+V</div>
        <div class="hint" id="hint">Hỗ trợ screenshot, ảnh đã copy, Snipping Tool hoặc ảnh copy từ trình duyệt.</div>
      </div>
    </div>

    <script>
      const zone = document.getElementById("pasteZone");
      const title = document.getElementById("title");
      const hint = document.getElementById("hint");

      function streamlitMessage(type, data) {
        window.parent.postMessage({ isStreamlitMessage: true, type, ...data }, "*");
      }

      function setFrameHeight() {
        streamlitMessage("streamlit:setFrameHeight", { height: document.body.scrollHeight });
      }

      function ready() {
        streamlitMessage("streamlit:componentReady", { apiVersion: 1 });
        setFrameHeight();
      }

      function setValue(value) {
        streamlitMessage("streamlit:setComponentValue", {
          dataType: "json",
          value,
        });
      }

      async function handlePaste(event) {
        const items = Array.from(event.clipboardData?.items || []);
        const imageItem = items.find((item) => item.type.startsWith("image/"));
        if (!imageItem) {
          title.textContent = "Clipboard chưa có ảnh";
          hint.textContent = "Hãy copy screenshot hoặc ảnh JPG/PNG rồi nhấn Ctrl+V lại.";
          return;
        }

        const file = imageItem.getAsFile();
        const reader = new FileReader();
        reader.onload = () => {
          title.textContent = "Đã dán ảnh";
          hint.textContent = `${file.type || "image"} đã sẵn sàng để detect.`;
          setValue({
            dataUrl: reader.result,
            mimeType: file.type,
            name: file.name || "clipboard-image.png",
            updatedAt: Date.now(),
          });
        };
        reader.readAsDataURL(file);
      }

      zone.addEventListener("click", () => zone.focus());
      zone.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          zone.focus();
          title.textContent = "Vùng dán đã được chọn";
          hint.textContent = "Nhấn Ctrl+V để dán ảnh từ clipboard.";
        }
      });
      zone.addEventListener("paste", handlePaste);
      window.addEventListener("message", (event) => {
        if (event.data?.type === "streamlit:render") {
          setFrameHeight();
        }
      });

      ready();
    </script>
  </body>
</html>
